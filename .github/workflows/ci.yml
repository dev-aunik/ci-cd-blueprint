name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_IMAGE: devmehedi/ci-cd-blueprint
  APP_VERSION: 0.1.0

jobs:
  validate:
    name: Validate application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint PHP files
        run: |
          docker run --rm \
            -v "$PWD/src:/app:ro" \
            -w /app \
            php:8.3-cli \
            sh -c 'find . -name "*.php" -print -exec php -l {} \;'

      - name: Validate Compose configuration
        run: docker compose config

      - name: Build Docker image
        run: |
          docker build \
            --build-arg APP_VERSION="${APP_VERSION}" \
            -t "${DOCKER_IMAGE}:ci-${GITHUB_SHA::7}" \
            .

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push Docker image
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Explain skipped publish
        if: env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == ''
        run: |
          echo "Docker Hub credentials are not configured."
          echo "Add DOCKER_USERNAME and DOCKER_PASSWORD secrets to enable publishing."
