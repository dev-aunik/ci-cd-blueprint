services:
  app:
    build: .
    container_name: ci-cd-blueprint
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: "${APP_NAME:-CI/CD Blueprint}"
      APP_ENV: "${APP_ENV:-local}"
      APP_VERSION: "${APP_VERSION:-0.1.0}"
    volumes:
      - ./src:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
